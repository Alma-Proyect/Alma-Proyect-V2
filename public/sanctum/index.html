<title>Sanctum</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=Cormorant:ital,wght@0,300;0,400;1,300;1,400&family=Cinzel:wght@400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* Paleta cabaña — misma casa que Alma, habitación más íntima */
  --bg:        #f0ddb8;
  --surface:   #e6cea0;
  --ink:       #2e1a08;
  --ink-mid:   rgba(46,26,8,0.65);
  --ink-soft:  rgba(46,26,8,0.4);
  --ink-faint: rgba(46,26,8,0.12);
  --terracotta:#7a4418;
  --terra-soft:rgba(122,68,24,0.1);
  --terra-faint:rgba(122,68,24,0.05);
  --sage:      #4a6040;
  --sage-soft: rgba(74,96,64,0.12);
  --gold:      #8a5220;
  --gold-soft: rgba(138,82,32,0.1);
  --danger:    #7a2020;
  /* Bloque oscuro de escritura — como acercarse al fuego */
  --dark-bg:   #2c1a08;
  --dark-ink:  rgba(240,220,185,0.88);
  --dark-border: rgba(180,120,40,0.22);
  --safe-top:  env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

html { height: 100%; }

body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'Lora', Georgia, serif;
  min-height: 100%;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  -webkit-text-size-adjust: 100%;
  touch-action: manipulation;
}

/* ── LOCK SCREEN ── */
#lock-screen {
  position: fixed; inset: 0; z-index: 100;
  background: #2c1a08;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 1.8rem;
  padding: 2rem 2rem calc(2rem + var(--safe-bottom));
}

.lock-candle {
  font-size: 2.8rem;
  animation: flicker 3s ease-in-out infinite alternate;
  filter: drop-shadow(0 0 20px rgba(200,140,60,0.5));
}
@keyframes flicker {
  0%   { opacity: 0.85; transform: scale(1) rotate(-0.5deg); }
  50%  { opacity: 1;    transform: scale(1.03) rotate(0.3deg); }
  100% { opacity: 0.9;  transform: scale(0.98) rotate(0.8deg); }
}

.lock-title {
  font-family: 'Cormorant', serif;
  font-size: 2rem;
  font-weight: 300;
  color: rgba(240,220,185,0.92);
  letter-spacing: 0.2em;
  text-align: center;
}

.lock-sub {
  font-family: 'Cormorant', serif;
  font-style: italic;
  font-size: 1rem;
  color: rgba(200,160,80,0.4);
  text-align: center;
}

.lock-input {
  width: 100%;
  max-width: 300px;
  background: rgba(240,220,185,0.07);
  border: 1px solid rgba(200,160,80,0.2);
  border-radius: 4px;
  padding: 1rem 1.2rem;
  color: rgba(240,220,185,0.92);
  font-family: 'Lora', serif;
  font-size: 1.1rem;
  text-align: center;
  letter-spacing: 0.25em;
  outline: none;
  -webkit-appearance: none;
  transition: border-color 0.3s;
}
.lock-input:focus { border-color: rgba(139,58,40,0.7); }
.lock-input::placeholder { letter-spacing: 0.08em; opacity: 0.35; font-size: 0.9rem; }

.lock-btn {
  background: var(--terracotta);
  border: none;
  border-radius: 4px;
  padding: 1rem 3rem;
  color: rgba(244,239,228,0.95);
  font-family: 'Cinzel', serif;
  font-size: 0.65rem;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: opacity 0.2s;
  min-height: 48px;
}
.lock-btn:active { opacity: 0.75; }

.lock-error {
  font-family: 'Cormorant', serif;
  font-style: italic;
  color: rgba(200,100,80,0.85);
  font-size: 0.9rem;
  min-height: 1.4rem;
  text-align: center;
}

/* ── APP ── */
#app { display: none; flex: 1; flex-direction: column; min-height: 100dvh; }

/* Nav */
nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: calc(0.85rem + var(--safe-top)) 1.2rem 0.85rem;
  border-bottom: 1px solid var(--ink-faint);
  background: var(--surface);
  position: sticky; top: 0; z-index: 10;
}

.nav-brand {
  font-family: 'Cinzel', serif;
  font-size: 0.7rem;
  letter-spacing: 0.35em;
  color: var(--terracotta);
}

.nav-tabs { display: flex; gap: 0.15rem; }

.nav-tab {
  background: none;
  border: none;
  padding: 0.55rem 0.85rem;
  font-family: 'Lora', serif;
  font-size: 0.8rem;
  color: var(--ink-mid);
  cursor: pointer;
  border-radius: 4px;
  -webkit-tap-highlight-color: transparent;
  transition: all 0.18s;
  min-height: 40px;
}
.nav-tab.active { color: var(--terracotta); background: var(--terra-soft); }

.nav-lock {
  background: none; border: none;
  font-size: 1.1rem; cursor: pointer;
  opacity: 0.35;
  padding: 0.4rem;
  -webkit-tap-highlight-color: transparent;
  min-width: 40px; min-height: 40px;
  display: flex; align-items: center; justify-content: center;
}

/* Views */
.view { display: none; flex: 1; overflow-y: auto; }
.view.active { display: flex; flex-direction: column; min-height: 0; }

/* ── WRITE ── */
#view-write {
  padding: 1.8rem 1.2rem calc(2rem + var(--safe-bottom));
  gap: 1.3rem;
  max-width: 640px;
  width: 100%;
  margin: 0 auto;
}

.write-date {
  font-family: 'Cinzel', serif;
  font-size: 0.55rem;
  letter-spacing: 0.25em;
  color: var(--ink-soft);
  text-transform: uppercase;
}

.write-prompt-label {
  font-family: 'Cormorant', serif;
  font-style: italic;
  font-size: 0.92rem;
  color: var(--ink-mid);
  margin-top: 0.2rem;
}

/* Toggle modo escritura */
.write-mode-toggle {
  display: flex;
  gap: 0.4rem;
  margin-bottom: 0.4rem;
}

.write-mode-btn {
  font-family: 'Lora', serif;
  font-size: 0.78rem;
  letter-spacing: 0.03em;
  color: var(--ink-soft);
  background: transparent;
  border: 1px solid var(--ink-faint);
  border-radius: 100px;
  padding: 0.35rem 0.9rem;
  cursor: pointer;
  transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
}

.write-mode-btn.active {
  color: var(--terracotta);
  border-color: var(--terracotta);
  background: var(--terra-faint);
}

.write-mode-btn:hover { opacity: 0.85; }

.prompt-box {
  background: var(--terra-faint);
  border: 1px solid rgba(139,58,40,0.15);
  border-left: 2px solid var(--terracotta);
  border-radius: 0 4px 4px 0;
  padding: 1rem 2.8rem 1rem 1.2rem;
  font-family: 'Cormorant', serif;
  font-style: italic;
  font-size: 1.05rem;
  line-height: 1.75;
  color: var(--ink);
  position: relative;
}

.prompt-refresh {
  position: absolute;
  top: 0.7rem; right: 0.7rem;
  background: none; border: none;
  font-size: 1rem; cursor: pointer;
  opacity: 0.3;
  padding: 0.3rem;
  -webkit-tap-highlight-color: transparent;
  min-width: 36px; min-height: 36px;
  display: flex; align-items: center; justify-content: center;
}

/* Mood */
.mood-row {
  display: flex;
  gap: 0.4rem;
  align-items: center;
  flex-wrap: wrap;
}

.mood-label {
  font-family: 'Cormorant', serif;
  font-style: italic;
  font-size: 0.82rem;
  color: var(--ink-soft);
  width: 100%;
  margin-bottom: 0.1rem;
}

.mood-btn {
  background: none;
  border: 1px solid var(--ink-faint);
  border-radius: 20px;
  padding: 0.35rem 0.85rem;
  font-size: 0.82rem;
  color: var(--ink-mid);
  cursor: pointer;
  font-family: 'Lora', serif;
  -webkit-tap-highlight-color: transparent;
  min-height: 36px;
  transition: all 0.18s;
}
.mood-btn.selected {
  background: var(--terra-soft);
  border-color: var(--terracotta);
  color: var(--terracotta);
}

/* Textarea — mobile key: no resize, good min-height */
.write-area {
  width: 100%;
  min-height: 280px;
  background: var(--surface);
  border: 1px solid var(--ink-faint);
  border-radius: 4px;
  padding: 1.2rem;
  font-family: 'Lora', serif;
  font-size: 1rem;
  line-height: 1.9;
  color: var(--ink);
  resize: none;
  outline: none;
  -webkit-appearance: none;
  transition: border-color 0.25s;
}
.write-area:focus { border-color: rgba(139,58,40,0.3); }
.write-area::placeholder { color: var(--ink-soft); font-style: italic; }

.write-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 1rem;
}

.word-count {
  font-family: 'Cormorant', serif;
  font-style: italic;
  font-size: 0.82rem;
  color: var(--ink-soft);
  flex-shrink: 0;
}

.save-area {
  display: flex;
  align-items: center;
  gap: 1rem;
}

.save-confirm {
  font-family: 'Cormorant', serif;
  font-style: italic;
  font-size: 0.85rem;
  color: var(--sage);
  opacity: 0;
  transition: opacity 0.4s;
  white-space: nowrap;
}
.save-confirm.show { opacity: 1; }

.save-btn {
  background: var(--terracotta);
  border: none;
  border-radius: 4px;
  padding: 0.85rem 1.8rem;
  color: rgba(244,239,228,0.95);
  font-family: 'Cinzel', serif;
  font-size: 0.6rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  min-height: 48px;
  transition: opacity 0.2s;
}
.save-btn:active { opacity: 0.75; }

/* ── HISTORIAL ── */
#view-historial {
  padding: 1.8rem 1.2rem calc(2rem + var(--safe-bottom));
  gap: 1rem;
  max-width: 640px;
  width: 100%;
  margin: 0 auto;
}

.section-title {
  font-family: 'Cormorant', serif;
  font-size: 1.3rem;
  font-weight: 300;
  color: var(--ink);
  padding-bottom: 0.8rem;
  border-bottom: 1px solid var(--ink-faint);
  display: flex;
  justify-content: space-between;
  align-items: baseline;
}

.section-count {
  font-family: 'Cormorant', serif;
  font-style: italic;
  font-size: 0.85rem;
  color: var(--ink-soft);
}

.entries-list { display: flex; flex-direction: column; gap: 2px; }

.entry-card {
  background: var(--surface);
  border: 1px solid var(--ink-faint);
  border-radius: 4px;
  padding: 1.1rem 1.2rem;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  position: relative;
  transition: border-color 0.2s;
}
.entry-card:active { background: white; }

.entry-meta {
  display: flex;
  justify-content: space-between;
  margin-bottom: 0.4rem;
}

.entry-date {
  font-family: 'Cinzel', serif;
  font-size: 0.52rem;
  letter-spacing: 0.18em;
  color: var(--ink-soft);
  text-transform: uppercase;
}

.entry-mood-tag {
  font-family: 'Cormorant', serif;
  font-style: italic;
  font-size: 0.75rem;
  color: var(--terracotta);
  opacity: 0.7;
}

.entry-preview {
  font-size: 0.9rem;
  line-height: 1.6;
  color: var(--ink-mid);
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.entry-words {
  margin-top: 0.4rem;
  font-family: 'Cormorant', serif;
  font-style: italic;
  font-size: 0.7rem;
  color: var(--ink-soft);
}

.entry-delete {
  position: absolute;
  top: 0.8rem; right: 0.8rem;
  background: none; border: none;
  font-size: 0.85rem; cursor: pointer;
  color: var(--danger);
  opacity: 0.25;
  padding: 0.3rem;
  min-width: 36px; min-height: 36px;
  display: flex; align-items: center; justify-content: center;
  -webkit-tap-highlight-color: transparent;
}
.entry-delete:active { opacity: 1; }
.entry-reset {
  position: absolute; top: 0.5rem; right: 2.2rem;
  background: none; border: none; cursor: pointer;
  color: var(--gold); opacity: 0.4; font-size: 0.9rem;
  padding: 0.3rem; transition: opacity 0.2s;
  min-width: 36px; min-height: 36px;
  display: flex; align-items: center; justify-content: center;
  -webkit-tap-highlight-color: transparent;
}
.entry-reset:hover, .entry-reset:active { opacity: 0.9; }

.empty-state {
  text-align: center;
  padding: 3rem 1rem;
  font-family: 'Cormorant', serif;
  font-style: italic;
  color: var(--ink-soft);
  font-size: 1rem;
  line-height: 1.9;
}

/* Modal */
.modal-overlay {
  position: fixed; inset: 0; z-index: 50;
  background: rgba(30,26,18,0.55);
  display: flex;
  align-items: flex-end;
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }

.modal {
  background: var(--surface);
  border-radius: 12px 12px 0 0;
  width: 100%;
  max-height: 85dvh;
  overflow-y: auto;
  padding: 1.5rem 1.5rem calc(1.5rem + var(--safe-bottom));
  transform: translateY(100%);
  transition: transform 0.35s cubic-bezier(0.16,1,0.3,1);
}
.modal-overlay.open .modal { transform: translateY(0); }

.modal-handle {
  width: 36px; height: 4px;
  background: var(--ink-faint);
  border-radius: 2px;
  margin: 0 auto 1.5rem;
}

.modal-date {
  font-family: 'Cinzel', serif;
  font-size: 0.52rem;
  letter-spacing: 0.22em;
  color: var(--ink-soft);
  text-transform: uppercase;
  margin-bottom: 0.3rem;
}
.modal-mood {
  font-family: 'Cormorant', serif;
  font-style: italic;
  font-size: 0.9rem;
  color: var(--terracotta);
  margin-bottom: 1.2rem;
}
.modal-content {
  font-size: 0.97rem;
  line-height: 1.95;
  color: var(--ink);
  white-space: pre-wrap;
}
.modal-close {
  display: block;
  width: 100%;
  margin-top: 1.5rem;
  background: none;
  border: 1px solid var(--ink-faint);
  border-radius: 4px;
  padding: 0.85rem;
  font-family: 'Cormorant', serif;
  font-style: italic;
  font-size: 0.9rem;
  color: var(--ink-mid);
  cursor: pointer;
  min-height: 48px;
  -webkit-tap-highlight-color: transparent;
}

/* ── ESENCIA ── */
#view-esencia {
  padding: 1.8rem 1.2rem calc(2rem + var(--safe-bottom));
  gap: 1.3rem;
  max-width: 640px;
  width: 100%;
  margin: 0 auto;
}

.esencia-sub {
  font-family: 'Cormorant', serif;
  font-style: italic;
  font-size: 0.88rem;
  color: var(--ink-soft);
  line-height: 1.65;
  margin-top: 0.3rem;
}

.distill-btn {
  background: none;
  border: 1px solid var(--terracotta);
  border-radius: 4px;
  padding: 0.85rem 1.8rem;
  color: var(--terracotta);
  font-family: 'Cinzel', serif;
  font-size: 0.6rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  min-height: 48px;
  transition: background 0.2s;
}
.distill-btn:active { background: var(--terra-soft); }
.distill-btn:disabled { opacity: 0.4; }

.distill-note {
  font-family: 'Cormorant', serif;
  font-style: italic;
  font-size: 0.82rem;
  color: var(--ink-soft);
  min-height: 1.2rem;
}

.essence-block {
  background: var(--surface);
  border: 1px solid var(--ink-faint);
  border-radius: 4px;
  padding: 1.2rem;
  display: flex;
  flex-direction: column;
  gap: 0.7rem;
}
.essence-block.terra { border-left: 2px solid var(--terracotta); background: var(--terra-faint); }
.essence-block.sage  { border-left: 2px solid var(--sage); background: var(--sage-soft); }
.essence-block.gold  { border-left: 2px solid var(--gold); background: var(--gold-soft); }

.essence-label {
  font-family: 'Cinzel', serif;
  font-size: 0.52rem;
  letter-spacing: 0.22em;
  color: var(--ink-soft);
  text-transform: uppercase;
}

.essence-value {
  font-family: 'Cormorant', serif;
  font-size: 1rem;
  line-height: 1.7;
  color: var(--ink);
}

.essence-tag {
  display: inline-block;
  background: var(--ink-faint);
  border-radius: 2px;
  padding: 0.15rem 0.5rem;
  font-size: 0.78rem;
  color: var(--ink-mid);
  margin: 0.2rem 0.2rem 0 0;
}

.prompt-preview-box {
  background: #1c1710;
  border-radius: 4px;
  padding: 1.2rem;
  font-family: 'Courier New', monospace;
  font-size: 0.75rem;
  line-height: 1.7;
  color: rgba(200,210,175,0.82);
  white-space: pre-wrap;
  word-break: break-word;
  border: 1px solid rgba(255,255,255,0.05);
  overflow-x: auto;
}

.copy-btn {
  background: none;
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 3px;
  padding: 0.5rem 1.2rem;
  color: rgba(200,210,175,0.55);
  font-family: 'Cinzel', serif;
  font-size: 0.58rem;
  letter-spacing: 0.15em;
  cursor: pointer;
  margin-top: 0.7rem;
  min-height: 40px;
  -webkit-tap-highlight-color: transparent;
}

.essence-empty {
  text-align: center;
  padding: 2.5rem 1rem;
  font-family: 'Cormorant', serif;
  font-style: italic;
  color: var(--ink-soft);
  font-size: 1rem;
  line-height: 1.9;
}

.essence-footer {
  font-family: 'Cormorant', serif;
  font-style: italic;
  font-size: 0.75rem;
  color: var(--ink-soft);
  text-align: right;
}

/* ── ALMA CHAT ── */
#view-alma {
  display: none;
  flex-direction: column;
  flex: 1;
  max-width: 640px;
  width: 100%;
  margin: 0 auto;
  height: calc(100dvh - 57px);
  max-height: calc(100dvh - 57px);
  overflow: hidden;
  position: relative;
}
#view-alma.active { display: flex; }

.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 1.5rem 1.2rem 1rem;
  display: flex;
  flex-direction: column;
  gap: 1.2rem;
  scroll-behavior: smooth;
}

.chat-msg {
  display: flex;
  flex-direction: column;
  gap: 0.25rem;
  max-width: 88%;
}

.chat-msg.user { align-self: flex-end; align-items: flex-end; }
.chat-msg.alma  { align-self: flex-start; align-items: flex-start; }

.chat-bubble {
  padding: 0.95rem 1.15rem;
  border-radius: 12px;
  font-family: 'Lora', serif;
  font-size: 0.93rem;
  line-height: 1.85;
  white-space: pre-wrap;
}

.chat-msg.user .chat-bubble {
  background: var(--dark-bg);
  color: var(--dark-ink);
  border-radius: 12px 12px 4px 12px;
}

.chat-msg.alma .chat-bubble {
  background: var(--surface);
  color: var(--ink);
  border: 1px solid var(--ink-faint);
  border-radius: 12px 12px 12px 4px;
}

/* Espejo — visualmente distinto */
.chat-mirror {
  align-self: flex-start;
  max-width: 92%;
  background: var(--terra-faint);
  border: 1px solid rgba(122,68,24,0.2);
  border-left: 3px solid var(--terracotta);
  border-radius: 0 8px 8px 0;
  padding: 1rem 1.2rem;
  font-family: 'Cormorant', serif;
  font-size: 1.05rem;
  font-style: italic;
  line-height: 1.75;
  color: var(--ink);
  animation: espejo-appear 0.6s ease;
}

.chat-mirror-label {
  font-family: 'Cinzel', serif;
  font-size: 0.48rem;
  letter-spacing: 0.28em;
  color: var(--terracotta);
  text-transform: uppercase;
  margin-bottom: 0.5rem;
  font-style: normal;
}

@keyframes espejo-appear {
  from { opacity: 0; transform: translateX(-8px); }
  to   { opacity: 1; transform: translateX(0); }
}

.chat-time {
  font-family: 'Cormorant', serif;
  font-size: 0.68rem;
  color: var(--ink-soft);
  margin-top: 0.1rem;
}

/* Indicador de escritura */
.chat-typing {
  align-self: flex-start;
  display: flex;
  gap: 5px;
  padding: 0.9rem 1.1rem;
  background: var(--surface);
  border: 1px solid var(--ink-faint);
  border-radius: 12px 12px 12px 4px;
}
.chat-typing span {
  width: 6px; height: 6px;
  background: var(--ink-soft);
  border-radius: 50%;
  animation: typing-dot 1.2s ease-in-out infinite;
}
.chat-typing span:nth-child(2) { animation-delay: 0.2s; }
.chat-typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes typing-dot {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
  30% { transform: translateY(-5px); opacity: 1; }
}

/* Input área */
.chat-input-area {
  padding: 0.9rem 1.2rem calc(0.9rem + var(--safe-bottom));
  border-top: 1px solid var(--ink-faint);
  background: var(--bg);
  display: flex;
  gap: 0.7rem;
  align-items: flex-end;
}

.chat-input {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--ink-faint);
  border-radius: 8px;
  padding: 0.85rem 1rem;
  font-family: 'Lora', serif;
  font-size: 0.93rem;
  line-height: 1.6;
  color: var(--ink);
  resize: none;
  outline: none;
  max-height: 140px;
  overflow-y: auto;
  -webkit-appearance: none;
  transition: border-color 0.2s;
}
.chat-input:focus { border-color: rgba(122,68,24,0.3); }
.chat-input::placeholder { color: var(--ink-soft); font-style: italic; }

.chat-send {
  background: var(--terracotta);
  border: none;
  border-radius: 8px;
  width: 44px;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
  transition: opacity 0.2s;
  color: rgba(244,239,228,0.95);
  font-size: 1.1rem;
}
.chat-send:active { opacity: 0.7; }
.chat-send:disabled { opacity: 0.35; cursor: default; }

.chat-empty {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 0.8rem;
  padding: 2rem;
  text-align: center;
  pointer-events: none;
}
.chat-empty-icon { font-size: 2rem; opacity: 0.25; }
.chat-empty-text {
  font-family: 'Cormorant', serif;
  font-style: italic;
  font-size: 1rem;
  color: var(--ink-soft);
  line-height: 1.7;
}
</style>

<body>

<!-- LOCK -->
<div id="lock-screen">
  <span class="lock-candle">🕯</span>
  <div style="text-align:center">
    <div class="lock-title">Sanctum</div>
    <div style="height:0.4rem"></div>
    <div class="lock-sub">Solo para la guardiana</div>
  </div>
  <input class="lock-input" id="lock-input" type="password"
    placeholder="contraseña" autocomplete="current-password"
    inputmode="text">
  <button class="lock-btn" onclick="tryUnlock()">Entrar</button>
  <div class="lock-error" id="lock-error"></div>
</div>

<!-- APP -->
<div id="app">
  <nav>
    <span class="nav-brand">✦ Sanctum</span>
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="switchView('write')">Escribir</button>
      <button class="nav-tab" onclick="switchView('historial')">Historial</button>
      <button class="nav-tab" onclick="switchView('esencia')">Esencia</button>
      <button class="nav-tab" onclick="switchView('alma')">Alma</button>
    </div>

  <!-- WRITE -->
  <div class="view active" id="view-write">
    <div class="write-date" id="write-date"></div>

    <div class="write-mode-toggle">
      <button class="write-mode-btn active" id="mode-prompt-btn" onclick="setWriteMode('prompt')">Con pregunta</button>
      <button class="write-mode-btn" id="mode-blank-btn" onclick="setWriteMode('blank')">Página en blanco</button>
    </div>

    <div id="prompt-section">
      <div class="write-prompt-label">Tu pregunta de hoy</div>
      <div class="prompt-box">
        <span id="prompt-text"></span>

    <div>
      <div class="mood-row">

        <button class="mood-btn" onclick="selectMood(this)">inquieta</button>
        <button class="mood-btn" onclick="selectMood(this)">cansada</button>
        <button class="mood-btn" onclick="selectMood(this)">esperanzada</button>
        <button class="mood-btn" onclick="selectMood(this)">confusa</button>
        <button class="mood-btn" onclick="selectMood(this)">presente</button>
        <button class="mood-btn" onclick="selectMood(this)">vacía</button>
        <button class="mood-btn" onclick="selectMood(this)">plena</button>

    <textarea class="write-area" id="write-area"

  <!-- HISTORIAL -->
  <div class="view" id="view-historial">

      <span class="section-count" id="historial-count"></span>
    </div>
    <div class="entries-list" id="entries-list"></div>
  </div>

  <!-- ESENCIA -->
  <div class="view" id="view-esencia">
    <div class="section-title">La Esencia Destilada</div>
    <div class="esencia-sub">
      Lo que extraes de tu práctica, listo para impregnar la voz del proyecto.
    </div>

    <button class="distill-btn" id="distill-btn" onclick="distillEssence()">
      ✦ Destilar
    </button>
    <div class="distill-note" id="distill-note"></div>

    <div id="essence-display"></div>
  </div>
</div>

  <!-- ALMA -->
  <div class="view" id="view-alma">
    <div class="chat-messages" id="chat-messages">
      <div class="chat-empty" id="chat-empty">
        <div class="chat-empty-icon">🕯</div>
        <div class="chat-empty-text">Aquí estoy.<br>Escribe lo que necesites.</div>
      </div>
    </div>
    <div class="chat-input-area">

        placeholder="Escribe a Alma…"
        rows="1"
        oninput="chatInputResize()"
        onkeydown="chatKeyDown(event)"></textarea>
      <button class="chat-send" id="chat-send" onclick="sendMessage()">↑</button>

<!-- MODAL (bottom sheet) -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal" id="modal-inner">
    <div class="modal-handle"></div>
    <div class="modal-date" id="modal-date"></div>
    <div class="modal-mood" id="modal-mood"></div>
    <div class="modal-content" id="modal-content"></div>
    <button class="modal-close" onclick="closeModalDirect()">Cerrar</button>
  </div>
</div>

<script>
// ── CONFIGURACIÓN ──
// Cambia esto antes de subir a Netlify
const PASSWORD = "R3f4g1oV0zAlm@2026";

const PROMPTS = [
  "¿En qué momento de esta semana te sostuviste sola sin hacer ruido sobre ello?",
  "¿Qué dejaste de sostener esta semana — aunque solo fuera por un momento? ¿Qué apareció debajo?",
  "¿Cuándo fue la última vez que lloraste sin intentar parar antes de tiempo?",
  "¿Qué parte de Alma nació para la mujer que fuiste — y cuál está naciendo para la que eres ahora?",
  "¿Qué escribió alguien esta semana que sentiste también dentro de ti?",
  "¿Dónde termina acompañar a otras y empieza dejarte a ti para después?",
  "¿Qué crees que necesitaría escuchar hoy la mujer que empezó todo esto?",
  "¿Qué crees que diría tu padre de lo que estás construyendo?",
  "¿Hubo un momento esta semana donde sentiste que te elegiste a ti misma?",
  "¿Y algún momento pequeño donde te abandonaste un poco para sostener otra cosa?",
  "¿Cómo estuvo la soledad esta semana — pesada, ligera, tuya?",
  "¿Hubo un momento donde estuviste sola y fue exactamente lo que necesitabas?",
  "¿Qué descubriste esta semana sobre la persona con la que más vas a vivir: tú?",
  "¿Qué patrón viejo apareció esta semana disfrazado de algo nuevo?",
  "¿Dónde sigues dándote menos de lo que le darías a alguien que quieres?",
  "¿Qué límite pusiste esta semana — aunque costara?",
  "¿Qué límite no pusiste — y sabes por qué?",
  "¿Qué verdad se quedó esta semana atrapada en tu garganta?",
  "¿Qué parte de tu esencia apareció esta semana sin que la llamaras?",
  "¿Cuándo te escuchaste esta semana sin corregir lo que sentías?",
  "¿Dónde está la luz hoy — grande, pequeña, casi invisible?",
  "¿Qué desearía para su vida la mujer que ya no le teme a la soledad?",
  "¿Qué semilla plantaste esta semana — para ti, no para nadie más?",
  "¿Qué necesita la guardiana que nadie ha pensado en darle?"
];

// ── ESTADO ──
let entries = [];
let essence = null;
let selectedMood = '';

// ── LOCK ──
function tryUnlock() {
  const val = document.getElementById('lock-input').value;
  if (val === PASSWORD) {
    document.getElementById('lock-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    init();
  } else {
    const err = document.getElementById('lock-error');
    err.textContent = 'Esa no es la palabra.';
    setTimeout(() => err.textContent = '', 2200);
    document.getElementById('lock-input').value = '';
    document.getElementById('lock-input').focus();
  }
}

document.getElementById('lock-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') tryUnlock();
});

function lock() {
  document.getElementById('app').style.display = 'none';
  document.getElementById('lock-screen').style.display = 'flex';
  document.getElementById('lock-input').value = '';
}

// ── INIT ──
async function init() {
  await loadData();
  setDate();
  newPrompt();
  renderHistorial();
  renderEssence();
}

// ── BACKEND API — toda comunicación con Supabase va por el servidor ──
async function loadData() {
  try {
    const res = await fetch('/.netlify/functions/sanctum-load');
    if (!res.ok) throw new Error(`sanctum-load error: ${res.status}`);
    const data = await res.json();
    entries = data.entries || [];
    essence = data.essence || null;
  } catch(e) {
    console.warn('Backend no disponible, usando localStorage:', e);
    try {
      entries = JSON.parse(localStorage.getItem('sanctum_v1_entries') || '[]');
      essence = JSON.parse(localStorage.getItem('sanctum_v1_essence') || 'null');
    } catch(e2) { entries = []; essence = null; }
  }
}

async function persist() {
  // Fallback a localStorage siempre
  try {
    localStorage.setItem('sanctum_v1_entries', JSON.stringify(entries));
    if (essence) localStorage.setItem('sanctum_v1_essence', JSON.stringify(essence));
  } catch(e) {}
}

function setDate() {
  document.getElementById('write-date').textContent =
    new Date().toLocaleDateString('es-ES', {
      weekday:'long', day:'numeric', month:'long', year:'numeric'
    });
}

function newPrompt() {
  document.getElementById('prompt-text').textContent =
    PROMPTS[Math.floor(Math.random() * PROMPTS.length)];
}

// ── MODO DE ESCRITURA — con pregunta o página en blanco ──
let writeMode = 'prompt';

function setWriteMode(mode) {
  writeMode = mode;
  const promptSection = document.getElementById('prompt-section');
  const promptBtn = document.getElementById('mode-prompt-btn');
  const blankBtn  = document.getElementById('mode-blank-btn');
  const writeArea = document.getElementById('write-area');

  if (mode === 'blank') {
    promptSection.style.display = 'none';
    promptBtn.classList.remove('active');
    blankBtn.classList.add('active');
    writeArea.placeholder = 'Página en blanco. Lo que sea que necesites poner aquí, sin pregunta, sin guía. Solo tú.';
  } else {
    promptSection.style.display = '';
    promptBtn.classList.add('active');
    blankBtn.classList.remove('active');
    writeArea.placeholder = 'Escribe desde donde estás. Sin filtro. Sin audiencia. Solo tú.';
  }
}

// ── WRITE ──
function selectMood(btn) {
  document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedMood = btn.textContent;
}

function updateCount() {
  const text = document.getElementById('write-area').value.trim();
  const words = text ? text.split(/\s+/).length : 0;
  document.getElementById('word-count').textContent =
    `${words} palabra${words !== 1 ? 's' : ''}`;
}

async function saveEntry() {
  const text = document.getElementById('write-area').value.trim();
  if (!text) return;

  const entry = {
    mood: selectedMood,
    prompt: writeMode === 'blank' ? '' : document.getElementById('prompt-text').textContent,
    content: text,
    words: text.split(/\s+/).length,
    distilled: false
  };

  // Guardar en backend
  try {
    const res = await fetch('/.netlify/functions/sanctum-save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ entry })
    });
    if (res.ok) {
      const data = await res.json();
      const newEntry = data.entry ? {
        id: data.entry.id,
        date: data.entry.created_at,
        ...entry
      } : { id: Date.now(), date: new Date().toISOString(), ...entry };
      entries.unshift(newEntry);
    } else {
      throw new Error(`sanctum-save error: ${res.status}`);
    }
  } catch(e) {
    // Fallback local
    entries.unshift({ id: Date.now(), date: new Date().toISOString(), ...entry });
  }

  await persist();

  document.getElementById('write-area').value = '';
  document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('selected'));
  selectedMood = '';
  updateCount();
  newPrompt();
  setWriteMode('prompt');

  const c = document.getElementById('save-confirm');
  c.classList.add('show');
  setTimeout(() => c.classList.remove('show'), 2500);
  renderHistorial();
}

// ── VIEWS ──
function switchView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  const idx = ['write','historial','esencia','alma'].indexOf(name);
  document.querySelectorAll('.nav-tab')[idx].classList.add('active');
  if (name === 'historial') renderHistorial();
  if (name === 'esencia') renderEssence();
  if (name === 'alma') chatScrollBottom();
}

// ── HISTORIAL ──
function renderHistorial() {
  const list = document.getElementById('entries-list');
  document.getElementById('historial-count').textContent =
    `${entries.length} entrada${entries.length !== 1 ? 's' : ''}`;

  if (!entries.length) {
    list.innerHTML = `<div class="empty-state">
      Aún no hay entradas.<br>
      <em>El primer trazo es siempre el más importante.</em>
    </div>`;
    return;
  }

  list.innerHTML = entries.map(e => `
    <div class="entry-card" onclick="openEntry(${e.id})">
      <div class="entry-meta">
        <span class="entry-date">${fmtDate(e.date)}</span>
        <span class="entry-mood-tag">${e.mood ? '· ' + e.mood : ''}</span>
      </div>
      <div class="entry-preview">${esc(e.content)}</div>
      <div class="entry-words">${e.words} palabras${e.distilled ? ' · destilada ✓' : ''}</div>
      ${e.distilled ? `<button class="entry-reset" onclick="resetDistilled(event,${e.id})" title="Marcar como no destilada">↺</button>` : ''}
      <button class="entry-delete" onclick="delEntry(event,${e.id})">✕</button>
    </div>
  `).join('');
}

function openEntry(id) {
  const e = entries.find(x => x.id === id);
  if (!e) return;
  document.getElementById('modal-date').textContent = fmtDate(e.date);
  document.getElementById('modal-mood').textContent = e.mood ? `Estado: ${e.mood}` : '';
  document.getElementById('modal-content').textContent = e.content;
  document.getElementById('modal').classList.add('open');
}

function closeModal(ev) {
  if (ev.target === document.getElementById('modal')) closeModalDirect();
}
function closeModalDirect() {
  document.getElementById('modal').classList.remove('open');
}

async function resetDistilled(event, id) {
  event.stopPropagation();
  event.preventDefault();
  const e = entries.find(x => x.id === id);
  if (!e) return;
  e.distilled = false;
  // Actualizar en Supabase
  try {
    await fetch('/.netlify/functions/sanctum-reset-distilled', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id: e.id })
    });
  } catch(err) {
    console.warn('No se pudo actualizar en backend:', err);
  }
  await persist();
  renderHistorial();
  document.getElementById('distill-note').textContent = 'Entrada marcada para redestilar.';
}

function delEntry(event, id) {
  event.stopPropagation();
  if (!confirm('¿Borrar esta entrada?')) return;
  entries = entries.filter(e => e.id !== id);
  persist();
  renderHistorial();
  // Borrar en backend (sin bloquear UI)
  fetch('/.netlify/functions/sanctum-delete', {
    method: 'DELETE',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ id })
  }).catch(e => console.warn('No se pudo borrar en backend:', e));
}

// ── ESENCIA ──
async function distillEssence() {
  if (!entries.length) {
    document.getElementById('distill-note').textContent = 'Escribe al menos una entrada primero.';
    return;
  }

  const btn = document.getElementById('distill-btn');
  btn.disabled = true;
  btn.textContent = 'Destilando…';
  document.getElementById('distill-note').textContent = '';

  try {
    const res = await fetch('/.netlify/functions/sanctum-distill', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ entries })
    });

    if (!res.ok) {
      const errData = await res.json().catch(() => ({}));
      console.error('sanctum-distill error:', res.status, errData);
      throw new Error(`Error del servidor: ${res.status}`);
    }

    const data = await res.json();

    if (!data.essence) {
      console.error('sanctum-distill: sin esencia en respuesta', data);
      throw new Error('Sin esencia en la respuesta');
    }

    // Actualizar estado local con la esencia nueva
    essence = data.essence;
    entries.forEach(e => e.distilled = true);

    // Renderizar inmediatamente con lo que llegó del servidor
    renderEssence();
    document.getElementById('distill-note').textContent =
      `Retrato actualizado · ${entries.length} entrada${entries.length !== 1 ? 's' : ''} · ${new Date().toLocaleDateString('es-ES')}`;

    // Guardar en localStorage en segundo plano — no bloqueante
    persist().catch(e => console.warn('persist error:', e));

  } catch(e) {
    console.error('Error destilando:', e);
    // Fallback local solo si el servidor falla completamente
    essence = buildEssence(entries);
    entries.forEach(e => e.distilled = true);
    renderEssence();
    document.getElementById('distill-note').textContent = `Error: ${e.message}. Mostrando destilación local.`;
    persist().catch(() => {});
  } finally {
    btn.disabled = false;
    btn.textContent = '✦ Destilar';
  }
}

function buildEssence(fresh) {
  const text = fresh.map(e => e.content).join('\n\n');
  const moods = fresh.map(e => e.mood).filter(Boolean);
  const freq = {};
  moods.forEach(m => freq[m] = (freq[m]||0)+1);
  const topMoods = Object.entries(freq).sort((a,b)=>b[1]-a[1]).map(x=>x[0]);
  const words = text.split(/\s+/).length;
  const avg = Math.round(words / fresh.length);

  // Tono basado en cómo escribe la guardiana esta semana
  const tono = avg > 200
    ? "Profunda y sin prisa. Va capa por capa, sin buscar resoluciones rápidas. Sabe que lo importante necesita espacio."
    : avg > 100
    ? "Directa y honesta. Nombra lo que hay sin rodeos, pero con cuidado. No sobreexplica — confía en que la otra lo entiende."
    : "Concisa y presente. Captura lo esencial en pocas palabras. Cada frase tiene peso.";

  return {
    generatedAt: new Date().toISOString(),
    count: fresh.length,
    total_words: words,
    avg_words: avg,
    tono_central: tono,
    sostiene_dolor: "Desde dentro. Sabe lo que es cargar sola — por eso no minimiza, no apresura, no da soluciones donde lo que se necesita es presencia. Sostiene porque ha aprendido a sostenerse.",
    valores: ["presencia real", "honestidad sin juicio", "pausa antes que solución", "voz propia", "compasión que no condescende"],
    preguntas: [
      "¿Qué necesitas que alguien vea hoy?",
      "¿Qué estarías sosteniendo si nadie te mirara?",
      "¿Qué pasaría si lo dejaras estar sin resolverlo?",
      "¿Qué parte de ti lleva tiempo sin ser escuchada?"
    ],
    nunca: [
      "fingir que no duele cuando duele",
      "apresurarse a la solución",
      "pedir más de lo que la persona puede dar ahora",
      "convertir el dolor en lección antes de tiempo",
      "validar desde la distancia — siempre desde dentro"
    ],
    estados: topMoods.slice(0,3)
  };
}

function renderEssence() {
  const d = document.getElementById('essence-display');

  if (!essence) {
    d.innerHTML = `<div class="essence-empty">
      La esencia aún no ha sido destilada.<br>
      <em>Escribe al menos una entrada<br>y pulsa "Destilar".</em>
    </div>`;
    return;
  }

  const sp = systemPrompt(essence);

  d.innerHTML = `
    <div class="essence-block terra">
      <div class="essence-label">Tono central</div>
      <div class="essence-value">${essence.tono_central}</div>
    </div>

    <div class="essence-block sage">
      <div class="essence-label">Cómo sostienes el dolor</div>
      <div class="essence-value">${essence.sostiene_dolor}</div>
    </div>

    <div class="essence-block">
      <div class="essence-label">Valores implícitos</div>
      <div class="essence-value">
        ${(essence.valores||[]).map(v=>`<span class="essence-tag">${v}</span>`).join('')}
      </div>
    </div>

    <div class="essence-block">
      <div class="essence-label">Formas de preguntar</div>
      <div class="essence-value">
        ${(essence.preguntas||[]).map(p=>`<div style="font-style:italic;color:var(--ink-mid);margin-bottom:0.35rem">— ${p}</div>`).join('')}
      </div>
    </div>

    <div class="essence-block gold">
      <div class="essence-label">Lo que nunca haces</div>
      <div class="essence-value">
        ${(essence.nunca||[]).map(v=>`<span class="essence-tag">${v}</span>`).join('')}
      </div>
    </div>

    ${essence.hilo_conductor ? `
    <div class="essence-block" style="border-left:2px solid var(--terracotta);background:var(--terra-faint)">
      <div class="essence-label">El hilo que lo atraviesa todo</div>
      <div class="essence-value" style="font-style:italic;font-size:1.05rem">${essence.hilo_conductor}</div>
    </div>` : ''}

    <div class="essence-block" style="background:#1c1710;border-color:rgba(255,255,255,0.05)">
      <div class="essence-label" style="color:rgba(200,210,175,0.4)">
        System prompt generado → para Claude
      </div>
      <div class="prompt-preview-box">${esc(sp)}</div>
      <button class="copy-btn" onclick="copyPrompt()">Copiar prompt</button>
    </div>

    <div class="essence-footer">
      ${fmtDate(essence.generatedAt)} · ${essence.count || 0} entradas · ${essence.total_words || 0} palabras
    </div>
  `;

  window._lastPrompt = sp;
}

function systemPrompt(e) {
  return `[ESENCIA DE LA GUARDIANA — contexto interno, no mencionar nunca]

Tono central: ${e.tono_central}

Cómo sostiene el dolor: ${e.sostiene_dolor}

Valores que guían su presencia: ${e.valores.join(', ')}

Formas de preguntar (úsalas como modelo, no literalmente):
${e.preguntas.map(p=>'- '+p).join('\n')}

Lo que nunca hace:
${e.nunca.map(n=>'- '+n).join('\n')}

[Encarna esta esencia en cada respuesta. No la menciones. No la expliques.]`;
}

function copyPrompt() {
  const text = window._lastPrompt || '';
  navigator.clipboard.writeText(text).then(() => {
    const btn = event.target;
    btn.textContent = 'Copiado ✓';
    setTimeout(() => btn.textContent = 'Copiar prompt', 2000);
  });
}

// ── ALMA CHAT ──
let chatHistory = []; // [{role, content}] para enviar a la API
let chatWaiting = false;

function chatScrollBottom() {
  const el = document.getElementById('chat-messages');
  if (el) el.scrollTop = el.scrollHeight;
}

function chatInputResize() {
  const el = document.getElementById('chat-input');
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 140) + 'px';
}

function chatKeyDown(e) {
  // Enviar con Enter en desktop (no en móvil — Shift+Enter salta línea)
  if (e.key === 'Enter' && !e.shiftKey && window.innerWidth > 600) {
    e.preventDefault();
    sendMessage();
  }
}

function fmtTime(date) {
  return date.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
}

function appendUserMessage(text) {
  const empty = document.getElementById('chat-empty');
  if (empty) empty.remove();

  const container = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = 'chat-msg user';
  div.innerHTML = `
    <div class="chat-bubble">${esc(text)}</div>
    <div class="chat-time">${fmtTime(new Date())}</div>
  `;
  container.appendChild(div);
  chatScrollBottom();
}

function appendAlmaMessage(text, isEspejo = false) {
  const container = document.getElementById('chat-messages');

  if (isEspejo) {
    const div = document.createElement('div');
    div.className = 'chat-mirror';
    div.innerHTML = `
      <div class="chat-mirror-label">Lo que veo</div>
      ${esc(text.replace(/^Lo que veo:\s*/i, ''))}
    `;
    container.appendChild(div);
  } else {
    const div = document.createElement('div');
    div.className = 'chat-msg alma';
    div.innerHTML = `
      <div class="chat-bubble">${esc(text)}</div>
      <div class="chat-time">${fmtTime(new Date())}</div>
    `;
    container.appendChild(div);
  }

  chatScrollBottom();
}

function showTyping() {
  const container = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.id = 'chat-typing';
  div.className = 'chat-typing';
  div.innerHTML = '<span></span><span></span><span></span>';
  container.appendChild(div);
  chatScrollBottom();
}

function hideTyping() {
  const el = document.getElementById('chat-typing');
  if (el) el.remove();
}

async function sendMessage() {
  if (chatWaiting) return;

  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;

  // Limpiar input
  input.value = '';
  input.style.height = 'auto';
  document.getElementById('chat-send').disabled = true;
  chatWaiting = true;

  // Mostrar mensaje de la guardiana
  appendUserMessage(text);

  // Añadir al historial local
  chatHistory.push({ role: 'user', content: text });

  // Mostrar typing
  showTyping();

  try {
    const res = await fetch('/.netlify/functions/sanctum-chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: text,
        history: chatHistory.slice(0, -1) // historial sin el último (ya está en message)
      })
    });

    hideTyping();

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error || `Error ${res.status}`);
    }

    const data = await res.json();

    // Respuesta normal de Alma
    if (data.respuesta) {
      appendAlmaMessage(data.respuesta);
      chatHistory.push({ role: 'assistant', content: data.respuesta });
    }

    // Espejo — si Alma tiene algo que observar
    if (data.espejo) {
      setTimeout(() => {
        appendAlmaMessage(data.espejo, true);
      }, 800);
    }

  } catch (e) {
    hideTyping();
    appendAlmaMessage('Algo falló. Inténtalo de nuevo.');
    console.error('Chat error:', e);
  } finally {
    chatWaiting = false;
    document.getElementById('chat-send').disabled = false;
    input.focus();
  }
}

function fmtDate(iso) {
  return new Date(iso).toLocaleDateString('es-ES', {
    weekday:'short', day:'numeric', month:'long'
  });
}

function esc(t) {
  return String(t)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;');
}
